    function inferInstruction92Tags(item) {
        const source = `${item.question} ${item.answer}`.toLowerCase();
        const tags = new Set();
        if (/глава\s*[1-9]\b|организац|прослежива|консилиум/.test(source)) tags.add("глава");
        if (/экк|эритроц/.test(source)) tags.add("ЭКК");
        if (/биологическ.*проб|биопроб/.test(source)) tags.add("биопроба");
        if (/протокол|медицинск.*карт|направлен|документ|журнал/.test(source)) tags.add("документация");
        if (/т\s*кк|тромбоц/.test(source)) tags.add("ТКК");
        if (/сзп|плазм/.test(source)) tags.add("СЗП/плазма");
        if (/криопреципит|фибриноген/.test(source)) tags.add("криопреципитат");
        if (/совместим|донор|реципиент|ab0|rh|kell/.test(source)) tags.add("совместимость");
        if (/аллоиммун|иммуногематолог|антител/.test(source)) tags.add("иммуногематология");
        if (/тр и пто|осложнен|реакци/.test(source)) tags.add("ТР/ПТО");
        return Array.from(tags);
    }

    function getNormalizedInstruction92Questions() {
        return instruction92Questions.map((item) => {
            const baseTags = Array.isArray(item.tags) ? item.tags.filter((t) => typeof t === "string" && t.trim()) : [];
            const inferredTags = inferInstruction92Tags(item);
            const tags = Array.from(new Set([...baseTags, ...inferredTags]));
            return { ...item, tags };
        });
    }

    function renderInstruction92TagFilters(questions) {
        const tagsContainer = document.getElementById("instruction92TagsFilter");
        if (!tagsContainer) return;

        const allTags = Array.from(new Set(questions.flatMap((item) => item.tags || []))).sort((a, b) =>
            a.localeCompare(b, "ru")
        );

        tagsContainer.innerHTML = allTags.map((tag) => `
            <button
                type="button"
                class="qa-tag-filter-btn ${selectedInstruction92Tags.has(tag) ? "is-active" : ""}"
                data-tag="${tag}"
            >#${tag}</button>
        `).join("");
    }

    function renderInstruction92Qa(filterText = "") {
        const qaList = document.getElementById("instruction92QaList");
        const emptyBlock = document.getElementById("instruction92QaEmpty");
        if (!qaList || !emptyBlock) return;

        const normalizedQuestions = getNormalizedInstruction92Questions();
        renderInstruction92TagFilters(normalizedQuestions);

        const query = filterText.trim().toLowerCase();
        const visibleItems = normalizedQuestions.filter(({ question, answer, tags }) => {
            const textMatch = !query || question.toLowerCase().includes(query) || answer.toLowerCase().includes(query);
            const tagsMatch = !selectedInstruction92Tags.size || tags.some((tag) => selectedInstruction92Tags.has(tag));
            return textMatch && tagsMatch;
        });

        qaList.innerHTML = visibleItems.map((item) => `
            <li class="qa-item">
                <button type="button" class="qa-question">
                    <span>${item.question}</span>
                    <span>▼</span>
                </button>
                <div class="qa-answer">
                    <div>${item.answer}</div>
                    <div class="qa-tags">${(item.tags || []).map((tag) => `<span class="qa-tag">#${tag}</span>`).join("")}</div>
                </div>
            </li>
        `).join("");

        emptyBlock.style.display = visibleItems.length ? "none" : "block";
    }

        const searchInput = document.getElementById("instruction92Search");
        const qaList = document.getElementById("instruction92QaList");
        const tagsContainer = document.getElementById("instruction92TagsFilter");
        if (!searchInput || !qaList || !tagsContainer) return;

        renderInstruction92Qa();

        searchInput.addEventListener("input", () => {
            renderInstruction92Qa(searchInput.value);
        });

        tagsContainer.addEventListener("click", (event) => {
            const button = event.target.closest(".qa-tag-filter-btn[data-tag]");
            if (!button) return;
            const tag = button.dataset.tag;
            if (!tag) return;
            if (selectedInstruction92Tags.has(tag)) selectedInstruction92Tags.delete(tag);
            else selectedInstruction92Tags.add(tag);
            renderInstruction92Qa(searchInput.value);
        });

        qaList.addEventListener("click", (event) => {
            const trigger = event.target.closest(".qa-question");
            if (!trigger) return;
            trigger.parentElement.classList.toggle("is-open");
        });
    }

    async function loadInstruction92Qa() {
        try {
            const response = await fetch(INSTRUCTION_92_QA_URL, { cache: "no-store" });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const data = await response.json();
            if (!Array.isArray(data)) {
                throw new Error("Некорректный формат JSON");
            }
            instruction92Questions = data.filter(
                (item) =>
                    item &&
                    typeof item.question === "string" &&
                    typeof item.answer === "string" &&
                    (!item.tags || Array.isArray(item.tags))
            );
        } catch (error) {
            // Fallback для случаев, когда fetch блокируется (например, при открытии по file://)
            try {
                const xhr = new XMLHttpRequest();
                xhr.open("GET", INSTRUCTION_92_QA_URL, false);
                xhr.send(null);
                if ((xhr.status >= 200 && xhr.status < 300) || (xhr.status === 0 && xhr.responseText)) {
                    const data = JSON.parse(xhr.responseText);
                    if (!Array.isArray(data)) {
                        throw new Error("Некорректный формат JSON в fallback");
                    }
                    instruction92Questions = data.filter(
                        (item) =>
                            item &&
                            typeof item.question === "string" &&
                            typeof item.answer === "string" &&
                            (!item.tags || Array.isArray(item.tags))
                    );
                } else {
                    throw new Error(`XHR status: ${xhr.status}`);
                }
            } catch (fallbackError) {
                instruction92Questions = [
                    {
                        question: "Не удалось загрузить банк вопросов из JSON",
                        answer: "Проверьте файл assets/instruction92_qa.json. Если страница открыта напрямую (file://), запустите локальный сервер (например, Live Server), либо держите проект открытым в среде, которая отдает файлы по http://localhost.",
                        tags: ["документация"]
                    }
                ];
                console.error("Ошибка загрузки instruction92_qa.json (fetch):", error);
                console.error("Ошибка fallback-загрузки (XHR):", fallbackError);
            }
        }
        renderInstruction92Qa(document.getElementById("instruction92Search")?.value || "");
    }

    buildNav();
    renderContent();
    setupModals();
    loadInstruction92Qa();
</script>
</body>
</html>
